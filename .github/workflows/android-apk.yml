name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    paths:
      - "mobile/android/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:
    inputs:
      supabase_url:
        description: "URL do projeto Supabase"
        required: false
        default: ""
      supabase_anon_key:
        description: "Anon key publica do Supabase"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Write Firebase config
        id: firebase_config
        working-directory: mobile/android
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          fi
          if [ -f app/google-services.json ]; then
            echo "has_config=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_config=false" >> "$GITHUB_OUTPUT"
            echo "GOOGLE_SERVICES_JSON secret not configured; Android APK build skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build debug APK
        if: steps.firebase_config.outputs.has_config == 'true'
        working-directory: mobile/android
        env:
          SUPABASE_URL: ${{ github.event.inputs.supabase_url || secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ github.event.inputs.supabase_anon_key || secrets.SUPABASE_ANON_KEY }}
        run: gradle :app:assembleDebug -PsupabaseUrl="$SUPABASE_URL" -PsupabaseAnonKey="$SUPABASE_ANON_KEY"

      - name: Upload APK
        if: steps.firebase_config.outputs.has_config == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wagen-android-nativo-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
